[flake8]
exclude = .git, *migrations*
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = {py310, py311, py312}-django{42, 52}, pylint

[testenv]
setenv =
    django42: DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local
    django52: DJANGO_SETTINGS_MODULE = testauth.settings_aa5.local

deps =
    django42: allianceauth<5
    django52: allianceauth>=5.0.0b2,<6

extras =
    test

commands_pre=
    pip list

commands=
    coverage run runtests.py -v 2
    coverage xml
    coverage report -m

[testenv:pylint]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local

deps=
    allianceauth<5
    pylint
    pylint-django
    factory_boy

commands=
    pylint --load-plugins pylint_django package_monitor
